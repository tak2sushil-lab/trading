<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <rect width="180" height="180" rx="36" fill="#0d1117"/>
  <!-- RED — short candle, wick on top -->
  <line x1="52" y1="52" x2="52" y2="78"  stroke="#f85149" stroke-width="7"   stroke-linecap="round"/>
  <line x1="52" y1="68" x2="52" y2="128" stroke="#f85149" stroke-width="14"  stroke-linecap="round"/>
  <!-- BLUE — tall center spine + handle -->
  <line x1="90" y1="22" x2="90" y2="162" stroke="#4f9cf6" stroke-width="14"  stroke-linecap="round"/>
  <!-- GREEN — tall candle, wick on top -->
  <line x1="128" y1="34" x2="128" y2="60"  stroke="#3fb950" stroke-width="7"   stroke-linecap="round"/>
  <line x1="128" y1="52" x2="128" y2="128" stroke="#3fb950" stroke-width="14"  stroke-linecap="round"/>
  <!-- CROSSBAR -->
  <line x1="52"  y1="128" x2="128" y2="128" stroke="#4f9cf6" stroke-width="14" stroke-linecap="round"/>
</svg>