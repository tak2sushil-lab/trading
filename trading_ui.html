<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trading Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&display=swap');

  :root {
    --bg:       #0c0e14;
    --surface:  #13161f;
    --card:     #191d28;
    --border:   #222738;
    --accent:   #4ade80;
    --accent2:  #60a5fa;
    --warn:     #fb923c;
    --red:      #f87171;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --dim:      #1e2433;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist Mono', monospace;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 10px; }

  .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 1.15rem;
    letter-spacing: -0.02em;
  }

  .logo span { color: var(--accent); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    animation: pulse 2s infinite;
  }

  .status-dot.connected { background: var(--accent); }
  .status-dot.error     { background: var(--red); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  .status-text { font-size: 0.6rem; color: var(--muted); }

  .header-right { display: flex; gap: 8px; align-items: center; }

  .pill-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 0.62rem;
    font-family: 'Geist Mono', monospace;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .pill-btn:hover  { color: var(--text); border-color: var(--accent2); }
  .pill-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(74,222,128,0.08); }

  .ticker-bar {
    background: var(--dim);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    display: flex;
    gap: 20px;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }

  .ticker-bar::-webkit-scrollbar { display: none; }

  .ticker-item {
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    font-size: 0.62rem;
  }

  .ticker-symbol { color: var(--text); font-weight: 500; }
  .ticker-price  { color: var(--muted); }

  .quick-actions {
    padding: 10px 12px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }

  .quick-actions::-webkit-scrollbar { display: none; }

  .qa-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.6rem;
    font-family: 'Geist Mono', monospace;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .qa-btn:hover  { color: var(--text); border-color: var(--accent2); }
  .qa-btn:active { transform: scale(0.97); }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    gap: 8px;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.user .msg-avatar   { background: rgba(96,165,250,0.15); color: var(--accent2); border: 1px solid rgba(96,165,250,0.2); }
  .msg.claude .msg-avatar { background: rgba(74,222,128,0.12); color: var(--accent);  border: 1px solid rgba(74,222,128,0.2); }
  .msg.system .msg-avatar { background: rgba(251,146,60,0.12);  color: var(--warn);   border: 1px solid rgba(251,146,60,0.2); }

  .msg-body { flex: 1; min-width: 0; }

  .msg-bubble {
    display: inline-block;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 0.72rem;
    line-height: 1.7;
    max-width: 85%;
    word-break: break-word;
  }

  .msg.user .msg-bubble {
    background: rgba(96,165,250,0.1);
    border: 1px solid rgba(96,165,250,0.2);
    margin-left: auto;
    border-bottom-right-radius: 4px;
  }

  .msg.claude .msg-bubble {
    background: var(--card);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg.system .msg-bubble {
    background: rgba(251,146,60,0.08);
    border: 1px solid rgba(251,146,60,0.2);
    color: var(--warn);
    font-size: 0.65rem;
    border-radius: 8px;
    width: 100%;
  }

  .msg-time {
    font-size: 0.55rem;
    color: var(--muted);
    margin-top: 4px;
    padding: 0 2px;
  }

  .msg.user .msg-time { text-align: right; }

  .typing {
    display: inline-flex;
    gap: 4px;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    border-bottom-left-radius: 4px;
  }

  .typing span {
    width: 6px; height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30%            { transform: translateY(-6px); background: var(--accent); }
  }

  .input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px;
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: flex-end;
    padding: 8px 12px;
    gap: 8px;
    transition: border-color 0.15s;
  }

  .input-wrap:focus-within { border-color: var(--accent2); }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Geist Mono', monospace;
    font-size: 0.72rem;
    line-height: 1.5;
    resize: none;
    max-height: 100px;
    min-height: 20px;
  }

  textarea::placeholder { color: var(--muted); }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    font-size: 0.9rem;
  }

  .send-btn:hover    { background: #22c55e; transform: scale(1.05); }
  .send-btn:disabled { background: var(--dim); cursor: not-allowed; transform: none; }

  .mic-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    font-size: 0.9rem;
  }

  .mic-btn:hover     { border-color: var(--accent2); }
  .mic-btn.listening { background: rgba(248,113,113,0.15); border-color: var(--red); animation: pulse 0.8s infinite; }

  .panel {
    display: none;
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: min(320px, 90vw);
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 100;
    flex-direction: column;
    animation: slideIn 0.2s ease;
  }

  .panel.open { display: flex; }

  @keyframes slideIn {
    from { transform: translateX(100%); }
    to   { transform: translateX(0); }
  }

  .panel-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .panel-title { font-family: 'Instrument Serif', serif; font-size: 1rem; }

  .close-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: 2px 6px; }
  .close-btn:hover { color: var(--text); }

  .panel-body { flex: 1; overflow-y: auto; padding: 16px; }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }

  .stat-label { font-size: 0.58rem; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.08em; }
  .stat-value { font-size: 1rem; font-family: 'Instrument Serif', serif; }
  .stat-value.green { color: var(--accent); }
  .stat-value.red   { color: var(--red); }

  .pos-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .pos-symbol { font-size: 0.78rem; font-weight: 500; }
  .pos-detail { font-size: 0.6rem; color: var(--muted); margin-top: 2px; }
  .pos-value  { font-size: 0.75rem; }

  .refresh-btn {
    width: 100%;
    background: var(--dim);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    font-family: 'Geist Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.15s;
  }

  .refresh-btn:hover { color: var(--text); border-color: var(--accent2); }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
  .overlay.open { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="status-dot" id="statusDot"></div>
    <div>
      <div class="logo">Trade<span>AI</span></div>
      <div class="status-text" id="statusText">connecting...</div>
    </div>
  </div>
  <div class="header-right">
    <button class="pill-btn" id="voiceToggle" onclick="toggleVoice()">🔊 voice off</button>
    <button class="pill-btn" onclick="openPanel()">📊 portfolio</button>
  </div>
</div>

<div class="ticker-bar">
  <div class="ticker-item"><span class="ticker-symbol">AAPL</span><span class="ticker-price" id="t-AAPL">—</span></div>
  <div class="ticker-item"><span class="ticker-symbol">MSFT</span><span class="ticker-price" id="t-MSFT">—</span></div>
  <div class="ticker-item"><span class="ticker-symbol">TSLA</span><span class="ticker-price" id="t-TSLA">—</span></div>
  <div class="ticker-item"><span class="ticker-symbol">AMZN</span><span class="ticker-price" id="t-AMZN">—</span></div>
  <div class="ticker-item"><span class="ticker-symbol">NVDA</span><span class="ticker-price" id="t-NVDA">—</span></div>
</div>

<div class="quick-actions">
  <button class="qa-btn" onclick="quickAsk('What is my account balance?')">💰 Balance</button>
  <button class="qa-btn" onclick="quickAsk('Show me my portfolio positions')">📋 Positions</button>
  <button class="qa-btn" onclick="quickAsk('What is the price of Apple?')">🍎 AAPL</button>
  <button class="qa-btn" onclick="quickAsk('What is the price of Microsoft?')">💻 MSFT</button>
  <button class="qa-btn" onclick="quickAsk('What is the price of Tesla?')">⚡ TSLA</button>
  <button class="qa-btn" onclick="quickAsk('Buy 5 shares of Apple at market price')">🟢 Buy AAPL</button>
  <button class="qa-btn" onclick="quickAsk('Cancel all my pending orders')">🔴 Cancel all</button>
</div>

<div class="messages" id="messages">
  <div class="msg system">
    <div class="msg-avatar">⚙</div>
    <div class="msg-body">
      <div class="msg-bubble">Connected to IBKR paper trading. Type or speak to trade. No real money involved.</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
    <div class="input-wrap">
      <textarea id="msgInput" placeholder="Ask anything... e.g. Buy 10 shares of Apple"
                rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-header">
    <div class="panel-title">Portfolio</div>
    <button class="close-btn" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panelBody">Loading...</div>
</div>

<script>
const BRIDGE = "http://127.0.0.1:8000";

let history     = [];
let voiceOn     = false;
let isBusy      = false;
let recognition = null;
let isListening = false;

// ── Init ──────────────────────────────────────────────────
window.addEventListener('load', () => {
  checkBridge();
  setupSpeech();
  loadTickers();
  setInterval(loadTickers, 60000);
});

async function checkBridge() {
  try {
    const r = await fetch(BRIDGE);
    const d = await r.json();
    document.getElementById('statusDot').className   = 'status-dot connected';
    document.getElementById('statusText').textContent = `${d.account} • paper trading`;
  } catch {
    document.getElementById('statusDot').className   = 'status-dot error';
    document.getElementById('statusText').textContent = 'bridge offline';
    addMsg('system', '❌ Cannot reach bridge.py\nMake sure it is running: py -3.11 bridge.py');
  }
}

async function loadTickers() {
  for (const sym of ['AAPL','MSFT','TSLA','AMZN','NVDA']) {
    try {
      const r = await fetch(`${BRIDGE}/quote/${sym}`);
      const d = await r.json();
      const el = document.getElementById(`t-${sym}`);
      if (el && d.best_price) el.textContent = `$${d.best_price}`;
    } catch {}
  }
}

// ── Send message ──────────────────────────────────────────
async function sendMessage(text) {
  if (isBusy) return;
  const input = document.getElementById('msgInput');
  const msg   = text || input.value.trim();
  if (!msg) return;

  input.value = '';
  autoResize(input);
  isBusy = true;
  document.getElementById('sendBtn').disabled = true;

  addMsg('user', msg);
  showTyping();

  try {
    // Send to bridge — bridge calls Claude and IBKR
    const r = await fetch(`${BRIDGE}/chat`, {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({
        messages: [{role:'user', content: msg}],
        history:  history
      })
    });

    const d = await r.json();
    history = d.history;  // keep conversation history

    addMsg('claude', d.reply);
    if (voiceOn) speak(d.reply);

  } catch(e) {
    addMsg('system', `Error: ${e.message}`);
  }

  isBusy = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function quickAsk(msg) { sendMessage(msg); }

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ── Messages UI ───────────────────────────────────────────
function addMsg(role, text) {
  const msgs = document.getElementById('messages');
  const t    = document.getElementById('typing-msg');
  if (t) t.remove();

  const avatars = {user:'👤', claude:'🤖', system:'⚙'};
  const time    = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${avatars[role]||'•'}</div>
    <div class="msg-body">
      <div class="msg-bubble">${esc(text)}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = 'msg claude';
  div.id = 'typing-msg';
  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-body">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── Voice output ──────────────────────────────────────────
function speak(text) {
  const u = new SpeechSynthesisUtterance(text.replace(/[#*`$]/g,''));
  u.rate  = 1.05;
  speechSynthesis.speak(u);
}

function toggleVoice() {
  voiceOn = !voiceOn;
  const btn = document.getElementById('voiceToggle');
  btn.textContent = voiceOn ? '🔊 voice on' : '🔊 voice off';
  btn.classList.toggle('active', voiceOn);
}

// ── Voice input ───────────────────────────────────────────
function setupSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recognition = new SR();
  recognition.continuous     = false;
  recognition.interimResults = false;
  recognition.lang           = 'en-US';
  recognition.onresult = e => {
    const text = e.results[0][0].transcript;
    sendMessage(text);
  };
  recognition.onend = () => {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
  };
}

function toggleMic() {
  if (!recognition) { addMsg('system','Use Chrome for voice input.'); return; }
  if (isListening) { recognition.stop(); }
  else {
    isListening = true;
    document.getElementById('micBtn').classList.add('listening');
    recognition.start();
  }
}

// ── Portfolio panel ───────────────────────────────────────
async function openPanel() {
  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  await refreshPanel();
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

async function refreshPanel() {
  const body = document.getElementById('panelBody');
  body.innerHTML = '<div style="color:var(--muted);font-size:0.65rem">Loading...</div>';
  try {
    const [acct, pos] = await Promise.all([
      fetch(`${BRIDGE}/account`).then(r=>r.json()),
      fetch(`${BRIDGE}/portfolio`).then(r=>r.json())
    ]);
    const pnl    = acct.UnrealizedPnL || 0;
    const pnlCls = pnl >= 0 ? 'green' : 'red';
    body.innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Net Liquidation</div>
        <div class="stat-value">$${(acct.NetLiquidation||0).toLocaleString()}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Cash</div>
        <div class="stat-value">$${(acct.TotalCashValue||0).toLocaleString()}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Unrealized P&L</div>
        <div class="stat-value ${pnlCls}">${pnl>=0?'+':''}$${Math.abs(pnl).toLocaleString()}</div>
      </div>
      <div style="font-size:0.6rem;color:var(--muted);margin:12px 0 8px;text-transform:uppercase;letter-spacing:0.08em">Positions (${pos.length})</div>
      ${pos.length===0
        ? '<div style="color:var(--muted);font-size:0.65rem">No open positions</div>'
        : pos.map(p=>`
          <div class="pos-row">
            <div>
              <div class="pos-symbol">${p.symbol}</div>
              <div class="pos-detail">${p.qty} shares @ $${p.avgCost}</div>
            </div>
            <div class="pos-value">$${(p.value||0).toLocaleString()}</div>
          </div>`).join('')
      }
      <button class="refresh-btn" onclick="refreshPanel()">↻ Refresh</button>`;
  } catch(e) {
    body.innerHTML = `<div style="color:var(--red);font-size:0.65rem">Error: ${e.message}</div>`;
  }
}
</script>
</body>
</html>
